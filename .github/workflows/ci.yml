name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  setup:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v3

      - name: Install
        run: make install

      - name: Upload venv artifact
        uses: actions/upload-artifact@v4
        with:
          name: venv-py${{ matrix.python-version }}
          path: .venv
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  lint:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: venv-py${{ matrix.python-version }}
          path: .venv

      - name: Restore venv binary permissions
        run: chmod -R u+x .venv/bin

      - name: Lint
        run: make lint

  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download venv artifact
        uses: actions/download-artifact@v4
        with:
          name: venv-py${{ matrix.python-version }}
          path: .venv

      - name: Restore venv binary permissions
        run: chmod -R u+x .venv/bin

      - name: Test
        run: make check